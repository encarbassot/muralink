name: publish

# Publishes @muralink/embed to npm via Trusted Publishing (OIDC) — no token,
# no OTP. npm must have this repo + workflow configured as a Trusted Publisher
# for the package (npmjs.com → package → Settings → Trusted Publisher).
#
# Trigger it from the Actions tab ("Run workflow") or by publishing a GitHub
# Release. It publishes the version currently in packages/embed/package.json —
# bump that first (npm rejects re-publishing an existing version).

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write        # required for npm Trusted Publishing (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      # Trusted Publishing needs a recent npm (>= 11.5.1).
      - run: npm install -g npm@latest

      - run: npm install --no-audit --no-fund

      # Builds the bundle, stages a clean package.json, and `npm publish`es.
      # OIDC provides auth automatically — no NODE_AUTH_TOKEN needed.
      - run: bash scripts/publish-embed.sh --publish