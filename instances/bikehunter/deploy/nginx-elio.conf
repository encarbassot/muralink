# nginx snippet — add inside the existing bikehunter server {} block.
# Proxies the Elio API same-origin under /elio/, so the employee dashboard
# (Rails + Vite) talks to it without CORS and the token never crosses origins.

location /elio/api/ {
    proxy_pass http://127.0.0.1:3001/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
}

location = /elio/health {
    proxy_pass http://127.0.0.1:3001/health;
}
